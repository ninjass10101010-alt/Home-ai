version: 3.8
services:
  consuela-dashboard:
    build: .
    container_name: consuela-dashboard
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
      - POCKETBASE_URL=http://pocketbase:8090
      - PB_URL=http://pocketbase:8090
      - PB_ADMIN_EMAIL=admin@family.local
      - PB_ADMIN_PASSWORD=${PB_ADM...D}
      - HERMES_API_URL=http://hermes-agent-2:8642/v1
      - HERMES_API_KEY=${HERMES...Y}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM...N}
      - OPENROUTER_API_KEY=${OPENROUTER...Y}
    networks:
      - consuela-net
      - media-stack_default

networks:
  consuela-net:
    name: familydashboard_consuela-net
    external: true
  media-stack_default:
    external: true
