version: '3.8'
services:
  home-dashboard:
    build: .
    container_name: home-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - media-stack_default

  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: consuela-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
    networks:
      - media-stack_default

networks:
  media-stack_default:
    external: true
